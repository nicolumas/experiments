<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LUMAS Exhibition — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- V2 type: Archivo (body / UI) from Google Fonts; Utile Display (display) self-hosted in assets/ -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/lumas-fonts.css" />
  <style>
    /* =========================================================
       LUMAS Exhibition — VIEWER (prototype)
       Extracted from the multi-mode exhibition app, then upgraded to the
       V2 brand system (Utile Display + Archivo, canonical Charcoal/Ivory/Bone)
       with Emil-style motion craft (press feedback, entrance stagger, strong easing).
       No build step, no backend. Fonts: assets/lumas-fonts.css (self-hosted
       Utile Display) + Google Fonts (Archivo). Artwork via picsum.photos.
       Open directly, or with #viewer?id=<exhibitionId>&lang=<en|de|fr>.
       ========================================================= */
    :root {
      /* LUMAS V2 brand palette — canonical Charcoal, Ivory, Bone. Three colours, forever. */
      --charcoal: #1C1A18;
      --ivory:    #F7F1E9;
      --bone:     #EAE2D8;

      /* Working aliases */
      --bg:       #F7F1E9;
      --surface:  #F7F1E9;
      --ink:      #1C1A18;

      /* Charcoal opacity scale (for rules, borders, secondary type on light) */
      --ink-80: rgba(28,26,24,0.80);
      --ink-60: rgba(28,26,24,0.60);
      --ink-40: rgba(28,26,24,0.40);
      --ink-28: rgba(28,26,24,0.28);
      --ink-20: rgba(28,26,24,0.20);
      --ink-14: rgba(28,26,24,0.14);
      --ink-10: rgba(28,26,24,0.10);
      --ink-06: rgba(28,26,24,0.06);
      --ink-04: rgba(28,26,24,0.04);

      /* Ivory opacity scale (for rules, borders, secondary type on dark) */
      --iv-80: rgba(247,241,233,0.80);
      --iv-60: rgba(247,241,233,0.60);
      --iv-40: rgba(247,241,233,0.40);
      --iv-28: rgba(247,241,233,0.28);
      --iv-20: rgba(247,241,233,0.20);
      --iv-14: rgba(247,241,233,0.14);
      --iv-10: rgba(247,241,233,0.10);
      --iv-06: rgba(247,241,233,0.06);
      --iv-04: rgba(247,241,233,0.04);

      --muted:     var(--ink-60);
      --line:      var(--ink-14);
      --line-soft: var(--ink-10);
      --wall:      var(--bone);

      --positive: #3d6b32;
      --warn:     #7a6434;
      --danger:   #9a3426;

      --shadow: 0 16px 40px -22px rgba(28,26,24,0.26), 0 3px 9px -6px rgba(28,26,24,0.10);
      /* V2 type — Utile Display (display tiers) + Archivo (body / UI). --serif is kept as an
         alias so the existing rules render Utile Display without touching every selector. */
      --display: 'UtileDisplay', 'Cormorant Garamond', Georgia, serif;
      --serif:   var(--display);
      --sans:    'Archivo', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      /* Emil — strong custom easing curves; the built-in CSS easings are too weak. */
      --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);

      /* Viewer (dark) surface — still Charcoal / Ivory, just inverted */
      --gallery-bg:     var(--charcoal);
      --gallery-wall:   #16130F;
      --gallery-ink:    var(--ivory);
      --gallery-muted:  var(--iv-60);
      --gallery-line:   var(--iv-14);
      --gallery-line-soft: var(--iv-06);
      --gallery-line-strong: var(--iv-28);
      --gallery-ink-60: var(--iv-60);
      --gallery-ink-40: var(--iv-40);
      --gallery-shadow: 0 28px 64px -18px rgba(0,0,0,0.60), 0 8px 22px -12px rgba(0,0,0,0.42);
      --gallery-drop: drop-shadow(0 24px 30px rgba(0,0,0,0.55)) drop-shadow(0 6px 12px rgba(0,0,0,0.42));
    }

    /* Light gallery surface — Ivory wall, Charcoal ink, Bone work surface */
    body.mode-viewer.viewer-light {
      --gallery-bg:   var(--ivory);
      --gallery-wall: var(--bone);
      --gallery-ink:  var(--charcoal);
      --gallery-muted: var(--ink-60);
      --gallery-line:  var(--ink-14);
      --gallery-line-soft: var(--ink-06);
      --gallery-line-strong: var(--ink-28);
      --gallery-ink-60: var(--ink-60);
      --gallery-ink-40: var(--ink-40);
      --gallery-shadow: 0 28px 64px -22px rgba(0,0,0,0.24), 0 8px 20px -10px rgba(0,0,0,0.12);
      --gallery-drop: drop-shadow(0 20px 26px rgba(28,26,24,0.20)) drop-shadow(0 5px 10px rgba(28,26,24,0.12));
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; }
    body.mode-viewer { overflow: hidden; background: var(--gallery-bg); color: var(--gallery-ink); }
    a { color: inherit; }
    button { font-family: inherit; }

    /* -------------- Shared primitives -------------- */
    .btn { display: inline-block; padding: 12px 24px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; background: var(--ink); color: var(--ivory); border: 1px solid var(--ink); cursor: pointer; font-family: inherit; text-decoration: none; transition: background-color 0.16s var(--ease-out), color 0.16s var(--ease-out), border-color 0.16s var(--ease-out), transform 0.16s var(--ease-out); }
    .btn:hover { background: transparent; color: var(--ink); }
    .btn-ghost { background: transparent; color: var(--ink); }
    .btn-ghost:hover { background: var(--ink); color: var(--ivory); }
    .btn-tiny { padding: 6px 12px; font-size: 10px; }
    /* Viewer (dark) primary — ivory on charcoal */
    body.mode-viewer .btn { background: var(--gallery-ink); color: var(--gallery-bg); border-color: var(--gallery-ink); }
    body.mode-viewer .btn:hover { background: transparent; color: var(--gallery-ink); }
    body.mode-viewer .btn-ghost { background: transparent; color: var(--gallery-ink); border-color: var(--gallery-ink-40); }
    body.mode-viewer .btn-ghost:hover { background: var(--gallery-ink); color: var(--gallery-bg); border-color: var(--gallery-ink); }

    /* ============================================================
       VIEWER VIEW — Charcoal wall, Ivory light
       ============================================================ */
    .viewer {
      position: fixed; inset: 0;
      background: var(--gallery-bg);
      color: var(--gallery-ink);
      overflow: hidden;
    }
    .v-topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 40; display: flex; align-items: center; justify-content: flex-end; padding: 14px 20px; pointer-events: none; gap: 14px; }
    .v-topbar > * { pointer-events: auto; }
    .v-brand { font-family: var(--sans); font-weight: 500; letter-spacing: 0.24em; font-size: 11px; text-transform: uppercase; color: var(--gallery-ink-60); white-space: nowrap; margin-right: auto; }
    .v-brand strong { color: var(--gallery-ink); font-weight: 500; letter-spacing: 0.28em; }
    .v-progress { flex: 1; margin: 0 18px; height: 1px; background: var(--gallery-line); position: relative; max-width: 360px; }
    .v-progress-bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--gallery-ink); width: 0%; transition: width 0.35s ease; }
    .v-progress-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gallery-ink-60); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .v-voice {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px 8px 10px;
      background: transparent; border: 1px solid var(--gallery-line-strong); color: var(--gallery-ink);
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .v-voice:hover { background: var(--gallery-line-soft); border-color: var(--gallery-ink-60); }
    .v-voice svg { width: 12px; height: 12px; fill: var(--gallery-ink); }
    .v-voice.playing { background: var(--gallery-ink); color: var(--gallery-bg); border-color: var(--gallery-ink); }
    .v-voice.playing svg { fill: var(--gallery-bg); }
    .v-voice[aria-disabled="true"] { opacity: 0.35; cursor: not-allowed; }
    .v-lang {
      display: inline-flex; gap: 0; border: 1px solid var(--gallery-line-strong); overflow: hidden;
    }
    .v-lang button {
      background: transparent; color: var(--gallery-ink-60); border: none; padding: 8px 10px;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer;
      font-family: inherit; transition: background 0.15s, color 0.15s;
    }
    .v-lang button + button { border-left: 1px solid var(--gallery-line); }
    .v-lang button.active { background: var(--gallery-ink); color: var(--gallery-bg); }
    .v-lang button:hover:not(.active) { color: var(--gallery-ink); }

    .v-track { display: flex; flex-direction: row; height: 100%; width: 100%; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; position: relative; }
    .v-track::-webkit-scrollbar { display: none; }
    .v-panel {
      flex: 0 0 100%; width: 100%; height: 100%;
      scroll-snap-align: start; scroll-snap-stop: always;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 48px 64px; position: relative;
      overflow: hidden; /* prevents content from bleeding into neighbouring panels */
      box-sizing: border-box;
    }

    /* Full-width panel so the next wall never peeks in — one centered moment per screen.
       Content is centred by the panel's align-items/justify-content + per-element max-widths. */
    .v-foyer { flex-direction: column; text-align: center; align-items: center; width: 100%; overflow-y: auto; max-height: 100%; }
    .v-foyer-eyebrow, .v-foyer-sub, .v-foyer-curator { max-width: 680px; }
    .v-foyer-eyebrow { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gallery-ink-60); margin-bottom: 28px; }
    .v-foyer-rule { width: 40px; height: 1px; background: var(--gallery-ink-40); margin: 0 auto 28px; }
    .v-foyer h1 { font-family: var(--serif); font-weight: 300; font-size: clamp(2.2rem, 6.5vw, 4.6rem); line-height: 1.05; margin: 0 0 20px; letter-spacing: -0.01em; text-wrap: balance; color: var(--gallery-ink); }
    .v-foyer-sub { font-family: var(--sans); font-weight: 300; font-size: clamp(1rem, 1.4vw, 1.25rem); line-height: 1.5; letter-spacing: 0.01em; color: var(--gallery-ink-60); max-width: 600px; margin: 0 auto 32px; }
    .v-foyer-statement { font-family: var(--sans); font-weight: 300; font-size: clamp(15px, 1.5vw, 17px); line-height: 1.7; text-wrap: pretty; color: var(--gallery-ink); max-width: 600px; margin: 0 auto 32px; }
    .v-foyer-curator { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gallery-ink-60); margin-bottom: 36px; }
    .v-foyer-cta { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gallery-bg); background: var(--gallery-ink); cursor: pointer; padding: 14px 30px; border: 1px solid var(--gallery-ink); font-family: inherit; transition: background 0.15s, color 0.15s; }
    .v-foyer-cta:hover { background: transparent; color: var(--gallery-ink); }
    .v-foyer-hint { margin-top: 22px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gallery-ink-40); display: flex; gap: 6px; justify-content: center; align-items: center; }
    .v-foyer-hint kbd { border: 1px solid var(--gallery-line); padding: 1px 6px; font-family: inherit; font-size: 10px; color: var(--gallery-ink-60); }

    .v-wall { flex-direction: column; }
    .v-wall-inner {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 1400px; max-height: 100%;
      gap: clamp(16px, 2.2vh, 28px);
      min-height: 0;
    }
    .v-wall-number { font-family: var(--sans); font-weight: 500; font-size: 10px; letter-spacing: 0.32em; color: var(--gallery-ink-60); text-transform: uppercase; flex: 0 0 auto; }
    .v-wall-title { font-family: var(--serif); font-weight: 400; font-size: clamp(1.1rem, 1.8vw, 1.7rem); letter-spacing: 0; color: var(--gallery-ink); text-align: center; text-wrap: balance; max-width: 720px; flex: 0 0 auto; }
    .v-wall-arrangement {
      display: flex; align-items: flex-end; justify-content: center;
      gap: clamp(16px, 3vw, 44px); width: 100%;
      flex: 1 1 auto; min-height: 0;
      max-height: 72vh; /* keep art off the chrome */
    }

    .v-wall-note {
      max-width: 580px; text-align: center;
      font-family: var(--sans); font-weight: 300;
      font-size: clamp(0.95rem, 1.3vw, 1.1rem); line-height: 1.6; text-wrap: pretty;
      color: var(--gallery-ink); opacity: 0.85;
      padding-top: 14px; position: relative;
      flex: 0 0 auto;
      max-height: 14vh; overflow: hidden; /* keep note from pushing art off-screen */
    }
    .v-wall-note::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 1px; background: var(--gallery-ink-40);
    }

    /* Works — no frame. The art is its own edge. Width & height use min(clamp(vw), vh) so aspect-ratio is preserved. */
    .v-work { position: relative; cursor: pointer; transition: transform 0.5s cubic-bezier(.2,.8,.2,1); flex: 0 1 auto; min-width: 0; margin: 0; }
    @media (hover: hover) and (pointer: fine) { .v-work:hover { transform: translateY(-4px); } }
    /* Never crop the art: contain shows the whole work; drop-shadow() hugs the actual
       image (the letterbox area is transparent) instead of boxing the empty space. */
    .v-work .art {
      display: block; background-color: transparent; background-size: contain; background-repeat: no-repeat; background-position: center;
      position: relative;
      filter: var(--gallery-drop);
    }
    /* Portrait 2:3 — cap height by 55vh, width stays proportional via 2/3 factor */
    .v-work.portrait  .art { width: min(clamp(180px, 22vw, 340px), calc(55vh * 2 / 3)); height: min(clamp(270px, 33vw, 510px), 55vh); }
    /* Landscape 3:2 — cap height by 45vh */
    .v-work.landscape .art { width: min(clamp(260px, 36vw, 540px), calc(45vh * 3 / 2)); height: min(clamp(170px, 24vw, 356px), 45vh); }
    /* Square 1:1 — cap by 55vh */
    .v-work.square    .art { width: min(clamp(220px, 26vw, 400px), 55vh);            height: min(clamp(220px, 26vw, 400px), 55vh); }

    /* Salon hang: five works in one clean row, sized to fit so they never overlap.
       Each figure is pinned to the art width so long captions wrap within it (rather
       than widening the figure and forcing a wrap that collides with the wall note). */
    .v-wall.salon .v-wall-arrangement { gap: clamp(14px, 1.8vw, 30px); flex-wrap: nowrap; align-items: flex-end; }
    .v-wall.salon .v-work { flex: 0 0 auto; }
    .v-wall.salon .v-work.landscape { width: min(17vw, 244px); }
    .v-wall.salon .v-work.portrait  { width: min(11.4vw, 164px); }
    .v-wall.salon .v-work.square    { width: min(14vw, 200px); }
    .v-wall.salon .v-work .art { width: 100%; }
    .v-wall.salon .v-work.landscape .art { height: min(11.3vw, 162px); }
    .v-wall.salon .v-work.portrait  .art { height: min(17vw, 244px); }
    .v-wall.salon .v-work.square    .art { height: min(14vw, 200px); }
    .v-wall.salon .v-work-caption { margin-top: 10px; font-size: 9px; letter-spacing: 0.18em; }
    @media (hover: hover) and (pointer: fine) { .v-wall.salon .v-work:hover { transform: translateY(-6px); } }
    /* The salon is the closing room — offer to take the whole show home from here. */
    .v-secure-cta { margin-top: clamp(6px, 1.2vh, 16px); }
    /* Single-hero allows more height: cap 68vh */
    .v-wall.single-hero .v-work.portrait  .art { width: min(clamp(260px, 32vw, 460px), calc(68vh * 2 / 3)); height: min(clamp(390px, 48vw, 690px), 68vh); }
    .v-wall.single-hero .v-work.landscape .art { width: min(clamp(380px, 48vw, 740px), calc(60vh * 3 / 2)); height: min(clamp(251px, 32vw, 488px), 60vh); }
    .v-wall.single-hero .v-work.square    .art { width: min(clamp(300px, 36vw, 520px), 68vh);              height: min(clamp(300px, 36vw, 520px), 68vh); }

    .v-wall.diptych .v-wall-arrangement { gap: clamp(30px, 5vw, 70px); }
    .v-wall.triptych .v-wall-arrangement { gap: clamp(18px, 3vw, 44px); align-items: center; }
    .v-wall.triptych .v-work:not(:nth-child(2)) { transform: translateY(10px); }
    @media (hover: hover) and (pointer: fine) { .v-wall.triptych .v-work:not(:nth-child(2)):hover { transform: translateY(4px); } }
    /* Three landscape works can't sit at hero width without colliding — pin each figure so
       all three fit the row (the art fills it, long captions wrap within), as the salon does. */
    @media (min-width: 721px) {
      .v-wall.triptych .v-work.landscape { flex: 0 0 auto; width: min(26vw, 380px); }
      .v-wall.triptych .v-work.landscape .art { width: 100%; height: auto; aspect-ratio: 3 / 2; }
    }
    /* Comparison — two works, a single quiet rule between them */
    .v-wall.comparison .v-wall-arrangement { gap: clamp(40px, 6vw, 80px); position: relative; }
    .v-wall.comparison .v-wall-arrangement::after {
      content: ''; position: absolute; left: 50%; top: 22%; bottom: 22%; width: 1px;
      background: var(--gallery-line);
    }

    .v-sold-dot { position: absolute; top: 10px; right: 10px; width: 7px; height: 7px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 0 2px var(--gallery-bg); z-index: 3; }
    .v-work-caption { margin-top: 14px; text-align: center; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gallery-ink-60); }
    .v-work-caption strong { font-weight: 500; color: var(--gallery-ink); letter-spacing: 0.24em; }
    .v-work-caption em { font-style: normal; color: var(--gallery-ink); font-family: var(--serif); letter-spacing: 0; text-transform: none; font-size: 13px; opacity: 0.92; }

    /* Closing — invite to walk another exhibition */
    .v-closing { flex-direction: column; text-align: center; align-items: center; width: 100%; padding: 80px 48px 64px; overflow-y: auto; max-height: 100%; }
    .v-closing-eyebrow { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gallery-ink-60); margin-bottom: 22px; }
    .v-closing h2 { font-family: var(--serif); font-weight: 300; font-size: clamp(1.7rem, 4.2vw, 2.8rem); line-height: 1.12; margin: 0 0 18px; text-wrap: balance; color: var(--gallery-ink); }
    .v-closing p { color: var(--gallery-ink-60); font-size: 15px; line-height: 1.8; margin-bottom: 32px; max-width: 540px; margin-left: auto; margin-right: auto; font-family: var(--sans); font-weight: 300; }
    .v-closing-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 44px; }
    .v-other-heading { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gallery-ink-60); margin-bottom: 20px; }
    .v-other-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(22px, 2.6vw, 40px); width: min(1040px, 100%); margin: 0 auto; }
    @media (max-width: 820px) { .v-other-grid { grid-template-columns: 1fr; } }
    /* Borderless teaser cards — one image, title, dek, quiet link. No box, no collage. */
    .v-other-card {
      display: flex; flex-direction: column; gap: 12px;
      text-align: left; cursor: pointer; text-decoration: none; color: inherit;
    }
    .v-other-card .cover { aspect-ratio: 3/2; background-size: cover; background-position: center; background-color: var(--gallery-wall); filter: var(--gallery-drop); transition: opacity 0.3s var(--ease-out); }
    .v-other-card:hover .cover { opacity: 0.82; }
    .v-other-card h4 { font-family: var(--serif); font-weight: 400; font-size: 19px; margin: 6px 0 0; line-height: 1.2; color: var(--gallery-ink); }
    .v-other-card p { font-size: 12.5px; color: var(--gallery-ink-60); margin: 0; line-height: 1.55; font-family: var(--sans); font-weight: 300; max-width: 30ch; }
    .v-other-card .walk-cta { margin-top: 2px; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gallery-ink-60); transition: color 0.2s var(--ease-out); }
    .v-other-card:hover .walk-cta { color: var(--gallery-ink); }

    .v-nav-btn { position: fixed; top: 50%; transform: translateY(-50%); z-index: 35; width: 44px; height: 44px; border-radius: 50%; background: transparent; backdrop-filter: blur(10px); border: 1px solid var(--gallery-line-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
    .v-nav-btn:hover { background: var(--gallery-line-soft); border-color: var(--gallery-ink-60); }
    .v-nav-btn svg { width: 16px; height: 16px; stroke: var(--gallery-ink); stroke-width: 1.5; fill: none; }
    .v-nav-prev { left: 20px; }
    .v-nav-next { right: 20px; }
    .v-nav-btn.hidden { opacity: 0; pointer-events: none; }

    /* Detail panel — Ivory surface */
    .v-detail { position: fixed; top: 0; right: 0; bottom: 0; width: min(460px, 100vw); background: var(--ivory); border-left: 1px solid var(--ink-14); transform: translateX(100%); transition: transform 0.42s var(--ease-drawer); z-index: 60; overflow-y: auto; color: var(--ink); }
    .v-detail.open { transform: translateX(0); }
    .v-detail-close { position: absolute; top: 14px; right: 14px; z-index: 2; background: none; border: none; cursor: pointer; padding: 8px; font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-60); }
    .v-detail-close:hover { color: var(--ink); }
    .v-detail-image { width: 100%; aspect-ratio: 3/4; background: var(--bone); display: flex; align-items: center; justify-content: center; padding: 28px; }

const Analytics = (function () {
  const sessionId = 'ls_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
  const queue = [];
  const MAX_QUEUE = 500;
  function track(event, props) {
    const ev = {
      source: 'lumas-exhibition',
      event: event,
      sessionId,
      ts: new Date().toISOString(),
      url: location.href,
      route: 'viewer',
      props: props || {},
    };
    queue.push(ev);
    if (queue.length > MAX_QUEUE) queue.shift();
    try { console.debug('[LUMAS analytics]', ev.event, ev.props); } catch (_) {}
    // Forward to any embedding parent (Spryker host page, etc.)
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ source: 'lumas-exhibition', type: 'analytics', payload: ev }, '*');
      }
    } catch (_) {}
  }
  function history() { return queue.slice(); }
  return { track, history, sessionId };
})();

}

// In-memory exhibition store — deterministic, no localStorage coupling.
function loadExhibitions() {
  return SAMPLE_EXHIBITIONS.map(e => migrateExhibition(JSON.parse(JSON.stringify(e))));
}
function getExhibition(id) {
  const ex = loadExhibitions().find(e => e.id === id);
  return ex ? migrateExhibition(ex) : null;
}

// --------- images ---------
function workImage(w, width = 900) {
  if (w.image) return w.image; // real LUMAS artwork image (bare art, hotlinkable)
  const seed = parseInt(w.id.replace(/\D/g, ''), 10) + 200;
  const aspect = w.orientation === 'portrait' ? 1.5 : w.orientation === 'square' ? 1 : 0.66;
  const h = Math.round(width * aspect);
  return `https://picsum.photos/seed/lumas${seed}/${width}/${h}`;
}
function svgFallback(w) {
  const c = w.palette || '#c0b8a8';
  const dark = c.replace(/^#/, '').match(/.{2}/g).map(h => Math.max(0, parseInt(h,16) - 40).toString(16).padStart(2,'0')).join('');
  // encodeURIComponent leaves apostrophes raw; escape them so the data URI is safe inside single-quoted url('...').
  const svg = encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 90'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='${c}'/><stop offset='1' stop-color='#${dark}'/></linearGradient></defs><rect width='60' height='90' fill='url(#g)'/><rect x='12' y='66' width='36' height='1' fill='#fff' fill-opacity='0.25'/></svg>`).replace(/'/g, '%27');
  return `data:image/svg+xml;charset=UTF-8,${svg}`;
}
// Single-quoted url() values so the whole thing is safe inside a double-quoted style="" attribute set via innerHTML.
// Single layer only: with background-size:contain a second (fallback) layer would
// show through the letterbox gaps as coloured bands. The transparent tile lets the
// gallery wall fill the letterbox instead.
function bgImage(w, px = 900) { return `url('${workImage(w, px)}')`; }

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

// =============================================================
// AI VOICE-OVER (Web Speech API)
// Sentence-chunked utterances give natural pauses between clauses.
// Per-language voice selection with preference for neural/premium voices.
// =============================================================
const Voice = {
  queue: [],       // pending SpeechSynthesisUtterance chunks
  current: null,   // currently speaking utterance
  button: null,    // current play button reference
  token: 0,        // invalidates in-flight async work on stop/route change
  audio: null,     // HTMLAudioElement currently playing an uploaded file, if any
};

function voicesReady() {
  return new Promise(resolve => {
    const s = window.speechSynthesis;
    if (!s) return resolve([]);
    const now = s.getVoices();
    if (now && now.length) return resolve(now);
    const handler = () => { s.removeEventListener('voiceschanged', handler); resolve(s.getVoices() || []); };
    s.addEventListener('voiceschanged', handler);
    setTimeout(() => resolve(s.getVoices() || []), 800); // fallback
  });
}

// Per-language preference lists — prefer neural / premium system voices first,
// fall back to any voice in the right locale, then any voice at all.
const VOICE_PREFS = {
  en: [
    /Samantha.*\(Premium\)/i, /Samantha/i,
    /Ava.*\(Premium\)/i, /Ava/i,
    /Allison.*\(Premium\)/i, /Allison/i,
    /Evan.*\(Premium\)/i,
    /Microsoft Jenny Online/i, /Microsoft Aria Online/i,
    /Google UK English Female/i,
    /Serena|Karen|Moira|Fiona|Tessa/i,
    /en-GB/i, /en-US/i, /^en/i,
  ],
  de: [
    /Anna.*\(Premium\)/i, /Anna/i,
    /Petra.*\(Premium\)/i, /Petra/i,
    /Markus.*\(Premium\)/i,
    /Microsoft Katja Online/i, /Microsoft Hedda Online/i,
    /Google Deutsch/i,
    /^de-DE/i, /^de/i,
  ],
  fr: [
    /Amélie.*\(Premium\)/i, /Amelie.*\(Premium\)/i, /Amélie|Amelie/i,
    /Thomas.*\(Premium\)/i, /Thomas/i,
    /Marie.*\(Premium\)/i,
    /Microsoft Denise Online/i, /Microsoft Julie Online/i,
    /Google français/i,
    /^fr-FR/i, /^fr/i,
  ],
};

function pickVoice(voices, lang = 'en') {
  const prefs = VOICE_PREFS[lang] || VOICE_PREFS.en;
  for (const re of prefs) {
    const m = voices.find(v => re.test(v.name) || re.test(v.lang));
    if (m) return m;
  }
  // last-ditch: anything matching the language prefix
  const prefix = lang.slice(0, 2);
  return voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix)) || voices[0] || null;
}

// Split a block of prose into speakable sentences.
function chunkForSpeech(text) {
  if (!text) return [];
  const cleaned = text.replace(/\s+/g, ' ').trim();
  const parts = cleaned.match(/[^.!?…]+[.!?…]+(?:["'”’)\]]+)?|[^.!?…]+$/g) || [cleaned];
  return parts.map(s => s.trim()).filter(Boolean);
}

const BCP47 = { en: 'en-US', de: 'de-DE', fr: 'fr-FR' };

function stopSpeech() {
  const s = window.speechSynthesis;
  Voice.token++;             // invalidate any pending queue
  Voice.queue = [];
  Voice.current = null;
  if (s) { try { s.cancel(); } catch(_) {} }
  // Also stop any uploaded-audio playback sharing this control
  if (Voice.audio) { try { Voice.audio.pause(); } catch(_) {} Voice.audio = null; }
  const btn = Voice.button;
  Voice.button = null;
  if (btn) {
    btn.classList.remove('playing');
    const lbl = btn.querySelector('.v-voice-label');
    if (lbl) lbl.textContent = btn.dataset.labelIdle || 'Listen';
  }
}

// Play an uploaded voice-over file (data URL stored per-language).
function playAudio(slot, button) {
  if (!slot || !slot.data) return;
  if (Voice.button === button && Voice.audio) { stopSpeech(); return; }
  stopSpeech();

  let audio;
  try { audio = new Audio(slot.data); } catch (_) { showToast('Could not load voice-over file'); return; }
  audio.preload = 'auto';
  Voice.audio = audio;
  Voice.button = button;
  if (button) {
    button.classList.add('playing');
    const lbl = button.querySelector('.v-voice-label');
    if (lbl) { button.dataset.labelIdle = lbl.textContent; lbl.textContent = 'Stop'; }
  }
  const cleanup = () => {
    if (Voice.audio !== audio) return;
    Voice.audio = null;
    const btn = Voice.button;
    Voice.button = null;
    if (btn) {
      btn.classList.remove('playing');
      const lbl = btn.querySelector('.v-voice-label');
      if (lbl) lbl.textContent = btn.dataset.labelIdle || 'Listen';
    }
  };
  audio.addEventListener('ended', cleanup);
  audio.addEventListener('error', () => { showToast('Voice-over file could not be played'); cleanup(); });
  audio.play().catch(() => { showToast('Tap again to play voice-over'); cleanup(); });
}

async function speak(text, button, lang = 'en') {
  const s = window.speechSynthesis;
  if (!s) { showToast('Voice-over not supported in this browser'); return; }
  if (!text || !text.trim()) return;

  // Toggle: same button tapped again → stop.
  if (Voice.button === button && (Voice.current || Voice.queue.length)) { stopSpeech(); return; }
  stopSpeech();

  const myToken = ++Voice.token;
  const voices = await voicesReady();
  if (myToken !== Voice.token) return;           // stopped while loading voices
  const voice = pickVoice(voices, lang);

  const chunks = chunkForSpeech(text);
  Voice.queue = chunks.map(chunk => {
    const u = new SpeechSynthesisUtterance(chunk);
    if (voice) u.voice = voice;
    u.lang = (voice && voice.lang) || BCP47[lang] || 'en-US';
    u.rate = 0.96;     // slightly slower than default — gallery pace
    u.pitch = 1.0;
    u.volume = 1.0;
    return u;
  });

  Voice.button = button;
  if (button) {
    button.classList.add('playing');
    const lbl = button.querySelector('.v-voice-label');
    if (lbl) { button.dataset.labelIdle = lbl.textContent; lbl.textContent = 'Stop'; }
  }

  // Drain the queue sequentially. Natural gap between utterances = breath.
  const drain = () => {
    if (myToken !== Voice.token) return;
    const next = Voice.queue.shift();
    if (!next) { Voice.current = null; stopSpeech(); return; }
    Voice.current = next;
    next.onend = () => { if (myToken === Voice.token) drain(); };
    next.onerror = () => { if (myToken === Voice.token) drain(); };
    try { s.speak(next); } catch(_) { drain(); }
  };
  drain();
}

let viewerState = { index: 0, total: 0, ex: null, lang: 'en' };

function renderViewer(exhibitionId, urlLang) {
  const ex = migrateExhibition(getExhibition(exhibitionId) || JSON.parse(JSON.stringify(SAMPLE_EXHIBITIONS[0])));
  viewerState.ex = ex;
  viewerState.total = ex.walls.length + 2;
  viewerState._completed = false;
  const langs = availableLangs(ex);
  // Resolve language: explicit URL param wins, otherwise default from first market, otherwise 'en'.
  let lang = urlLang && langs.includes(urlLang) ? urlLang : null;
  if (!lang) {
    const marketLang = MARKET_DEFAULT_LANG[(ex.markets && ex.markets[0]) || 'DACH'];
    lang = langs.includes(marketLang) ? marketLang : langs[0] || 'en';
  }
  viewerState.lang = lang;

  // Apply gallery surface (dark/light). Default dark.
  document.body.classList.toggle('viewer-light', ex.gallery === 'light');

  Analytics.track('exhibition_opened', {
    exhibitionId: ex.id, title: ex.title, lang,
    gallery: ex.gallery || 'dark',
    walls: ex.walls.length,
    markets: ex.markets || []
  });

  const langToggleHtml = langs.length > 1
    ? `<div class="v-lang" role="tablist" aria-label="Voice-over language">
         ${langs.map(l => `<button role="tab" data-lang="${l}" class="${l===lang?'active':''}" aria-selected="${l===lang}">${LANG_SHORT[l]}</button>`).join('')}
       </div>`
    : '';

  app.innerHTML = `
    <div class="viewer">
      <div class="v-topbar">
        <div class="v-brand"><strong>LUMAS</strong> · Exhibition</div>
        <div class="v-progress"><div class="v-progress-bar" id="v-progress-bar"></div></div>
        <div class="v-progress-label" id="v-progress-label">1 / ${viewerState.total}</div>
        ${langToggleHtml}
        <button class="v-voice" id="v-voice" aria-label="Play curator voice-over">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <span class="v-voice-label">Listen</span>
        </button>
      </div>
      <button class="v-nav-btn v-nav-prev hidden" id="v-nav-prev" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="v-nav-btn v-nav-next" id="v-nav-next" aria-label="Next"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></button>
      <div class="v-track" id="v-track" tabindex="0" aria-label="Exhibition walkthrough">
        ${viewerFoyer(ex)}
        ${ex.walls.map((w, i) => viewerWall(w, i)).join('')}
        ${viewerClosing(ex)}
      </div>
      <div class="v-backdrop" id="v-backdrop"></div>
      <aside class="v-detail" id="v-detail" role="dialog" aria-label="Work detail">
        <button class="v-detail-close" id="v-detail-close">Close</button>
        <div class="v-detail-image" id="v-detail-image"></div>
        <div class="v-detail-body" id="v-detail-body"></div>
      </aside>
      <div class="v-toast" id="v-toast">Saved to your wishlist</div>
    </div>
  `;

  bindViewer();
}

function viewerFoyer(ex) {
  return `
    <section class="v-panel v-foyer" data-index="0">
      <div class="v-foyer-eyebrow">LUMAS Exhibition · ${esc((ex.markets || [ex.market || '']).join(' · '))}</div>
      <div class="v-foyer-rule"></div>
      <h1>${esc(ex.title)}</h1>
      <div class="v-foyer-sub">${esc(ex.subtitle)}</div>
      <p class="v-foyer-statement">${esc(ex.statement)}</p>
      <div class="v-foyer-curator">Curated by ${esc(ex.curator)} · ${esc(ex.curatorRole)}</div>
      <button class="v-foyer-cta" id="v-begin">Enter the exhibition <span aria-hidden="true">→</span></button>
      <div class="v-foyer-hint"><span class="v-hint-keys">Or use <kbd>→</kbd> <kbd>←</kbd> · </span>scroll · swipe</div>
    </section>`;
}

function viewerWall(wall, i) {
  const works = wall.workIds.map(wid => WORKS.find(x => x.id === wid)).filter(Boolean);
  const worksHtml = works.map(w => {
    const soldOverride = wall.soldOutOverrides && wall.soldOutOverrides[w.id];
    const isSold = soldOverride !== undefined ? soldOverride : w.soldOut;
    return `
      <figure class="v-work ${w.orientation}" data-work="${w.id}" role="button" tabindex="0" aria-label="${esc(w.artist)} — ${esc(w.title)}">
        <div class="frame">
          <div class="art" style="background-image: ${bgImage(w, 900)}" aria-hidden="true"></div>
          ${isSold ? '<div class="v-sold-dot" title="No longer available"></div>' : ''}
        </div>
        <figcaption class="v-work-caption"><strong>${esc(w.artist)}</strong> · <em>${esc(w.title)}</em></figcaption>
      </figure>`;
  }).join('');
  return `
    <section class="v-panel v-wall ${wall.type}" data-index="${i + 1}" data-wall="${wall.id}">
      <div class="v-wall-inner">
        <div class="v-wall-number">Wall ${String(i + 1).padStart(2, '0')} — ${WALL_TYPES[wall.type] ? WALL_TYPES[wall.type].label : wall.type}</div>
        <div class="v-wall-title">${esc(wall.title || '')}</div>
        <div class="v-wall-arrangement">${worksHtml}</div>
        <div class="v-wall-note">${esc(wall.curatorNote || '')}</div>
        ${wall.type === 'salon' ? `<button class="v-foyer-cta v-secure-cta" data-secure>Secure the exhibition <span aria-hidden="true">→</span></button>` : ''}
      </div>
    </section>`;
}

function viewerClosing(ex) {
  // Find up to 3 other published exhibitions for the "walk another" grid.
  const others = loadExhibitions().filter(e => e.id !== ex.id).slice(0, 3);
  const pool = others.length < 3
    ? others.concat(SAMPLE_EXHIBITIONS.filter(s => s.id !== ex.id && !others.find(o => o.id === s.id))).slice(0, 3)
    : others;

  const otherCards = pool.map(o => {
    // One clean hero image per card — the exhibition's opening work.
    const hero = o.walls.flatMap(w => w.workIds).map(id => WORKS.find(x => x.id === id)).find(Boolean);
    const cover = hero ? `<div class="cover" style="background-image: ${bgImage(hero, 900)}"></div>` : `<div class="cover"></div>`;
    return `
      <a class="v-other-card" href="#viewer?id=${esc(o.id)}">
        ${cover}
        <h4>${esc(o.title)}</h4>
        <p>${esc(o.subtitle)}</p>
        <div class="walk-cta">Walk this exhibition →</div>
      </a>`;
  }).join('');

  return `
    <section class="v-panel v-closing" data-index="${ex.walls.length + 1}">
      <div class="v-closing-eyebrow">End of the walkthrough</div>
      <h2>Thank you for walking through.</h2>
      <p>If a work stayed with you, save it to your wishlist — or speak with one of our Art Consultants about how it could live with you.</p>
      <div class="v-closing-actions">
        <button class="btn" id="v-cta-restart">Walk it again</button>
        <button class="btn btn-ghost" id="v-cta-consult">Speak with an Art Consultant</button>
      </div>
      ${pool.length ? `<div class="v-other-heading">Or walk another exhibition</div><div class="v-other-grid">${otherCards}</div>` : ''}
    </section>`;
}

function bindViewer() {
  const track = document.getElementById('v-track');
  const prevBtn = document.getElementById('v-nav-prev');
  const nextBtn = document.getElementById('v-nav-next');
  const bar = document.getElementById('v-progress-bar');
  const label = document.getElementById('v-progress-label');
  const detail = document.getElementById('v-detail');
  const backdrop = document.getElementById('v-backdrop');
  const voiceBtn = document.getElementById('v-voice');

  // Panels are NOT all the same width (the foyer is capped at 820px, the closing at
  // 1100px), so scroll to each panel's real offset rather than index × clientWidth.
  // The old index × clientWidth math drifts and skips the first wall on wide
  // (>~1640px) viewports; offsets land exactly on the snap point at any width.
  function goTo(i) {
    i = Math.max(0, Math.min(viewerState.total - 1, i));
    const mobile = window.matchMedia('(max-width: 720px)').matches;
    const target = track.querySelectorAll('.v-panel')[i];
    if (target) {
      if (mobile) track.scrollTo({ top:  target.offsetTop,  behavior: 'smooth' });
      else        track.scrollTo({ left: target.offsetLeft, behavior: 'smooth' });
    }
    viewerState.index = i;
  }
  function panelMeta(idx) {
    const ex = viewerState.ex;
    if (idx === 0) return { kind: 'foyer', id: ex.id + ':foyer', title: 'Foyer' };
    if (idx > 0 && idx <= ex.walls.length) {
      const w = ex.walls[idx - 1];
      return { kind: 'wall', id: w.id, wallType: w.type, title: w.title || WALL_TYPES[w.type]?.label, wallIndex: idx };
    }
    return { kind: 'closing', id: ex.id + ':closing', title: 'Closing' };
  }
  function updateProgress() {
    const mobile = window.matchMedia('(max-width: 720px)').matches;
    const pos = mobile
      ? track.scrollTop / Math.max(1, track.scrollHeight - track.clientHeight)
      : track.scrollLeft / Math.max(1, track.scrollWidth - track.clientWidth);
    bar.style.width = Math.round(pos * 100) + '%';
    const offset = mobile ? track.scrollTop : track.scrollLeft;
    const prevIdx = viewerState.index;
    // Nearest panel by real offset — panels have unequal widths (see goTo).
    const panels = track.querySelectorAll('.v-panel');
    let nearest = 0, nd = Infinity;
    panels.forEach((p, idx) => {
      const o = mobile ? p.offsetTop : p.offsetLeft;
      const d = Math.abs(o - offset);
      if (d < nd) { nd = d; nearest = idx; }
    });
    viewerState.index = nearest;
    label.textContent = `${Math.min(viewerState.index + 1, viewerState.total)} / ${viewerState.total}`;
    prevBtn.classList.toggle('hidden', viewerState.index === 0);
    nextBtn.classList.toggle('hidden', viewerState.index === viewerState.total - 1);
    // Fire a panel_viewed on change
    if (prevIdx !== viewerState.index) {
      if (Voice.current || Voice.audio) stopSpeech();
      const meta = panelMeta(viewerState.index);
      Analytics.track('panel_viewed', { exhibitionId: viewerState.ex.id, index: viewerState.index, ...meta });
      // Reached the closing panel for the first time → mark completion.
      if (meta.kind === 'closing' && !viewerState._completed) {
        viewerState._completed = true;
        Analytics.track('exhibition_completed', { exhibitionId: viewerState.ex.id, walls: viewerState.ex.walls.length, lang: viewerState.lang });
      }
    }
    // Disable voice button on closing panel
    const closingIdx = viewerState.ex.walls.length + 1;
    voiceBtn.setAttribute('aria-disabled', viewerState.index === closingIdx ? 'true' : 'false');
  }
  track.addEventListener('scroll', updateProgress, { passive: true });
  prevBtn.addEventListener('click', () => { Analytics.track('panel_nav', { exhibitionId: viewerState.ex.id, dir: 'prev' }); goTo(viewerState.index - 1); });
  nextBtn.addEventListener('click', () => { Analytics.track('panel_nav', { exhibitionId: viewerState.ex.id, dir: 'next' }); goTo(viewerState.index + 1); });

  // Language toggle in the top bar
  document.querySelectorAll('.v-lang button').forEach(b => b.addEventListener('click', () => {
    const newLang = b.dataset.lang;
    if (newLang === viewerState.lang) return;
    const prevLang = viewerState.lang;
    viewerState.lang = newLang;
    document.querySelectorAll('.v-lang button').forEach(x => {
      x.classList.toggle('active', x === b);
      x.setAttribute('aria-selected', x === b ? 'true' : 'false');
    });
    if (Voice.current) stopSpeech();
    Analytics.track('language_changed', { exhibitionId: viewerState.ex.id, from: prevLang, to: newLang });
  }));

  // Pick voice-over text + optional uploaded audio for the current panel + selected language.
  function voicePayloadForCurrent() {
    const ex = viewerState.ex;
    const idx = viewerState.index;
    const lang = viewerState.lang || 'en';
    const pickText = (slot, fallback) => {
      if (!slot) return fallback || '';
      return (slot[lang] && slot[lang].trim()) || (slot.en && slot.en.trim()) || fallback || '';
    };
    const pickAudio = (slot) => {
      if (!slot) return null;
      return (slot[lang] && slot[lang].data) ? slot[lang] : (slot.en && slot.en.data ? slot.en : null);
    };
    if (idx === 0) return { text: pickText(ex.voiceIntro, ex.statement), audio: pickAudio(ex.voiceIntroAudio) };
    if (idx > 0 && idx <= ex.walls.length) {
      const wall = ex.walls[idx - 1];
      return { text: pickText(wall.voiceScript, wall.curatorNote), audio: pickAudio(wall.voiceScriptAudio) };
    }
    return { text: '', audio: null };
  }

  // Voice-over — prefer uploaded audio file, fall back to Web Speech TTS
  voiceBtn.addEventListener('click', () => {
    if (voiceBtn.getAttribute('aria-disabled') === 'true') return;
    const { text, audio } = voicePayloadForCurrent();
    if (audio && audio.data) {
      Analytics.track('voice_started', { exhibitionId: viewerState.ex.id, index: viewerState.index, mode: 'audio-file', lang: viewerState.lang });
      playAudio(audio, voiceBtn);
      return;
    }
    if (!text.trim()) { showToast('No voice-over written for this wall'); return; }
    Analytics.track('voice_started', { exhibitionId: viewerState.ex.id, index: viewerState.index, mode: 'tts', lang: viewerState.lang });
    speak(text, voiceBtn, viewerState.lang);
  });

  // Keyboard
  function onKey(e) {
    if (location.hash.replace(/^#\/?/, '').split('?')[0] !== 'viewer') return;
    if (detail.classList.contains('open')) { if (e.key === 'Escape') closeDetail(); return; }
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); goTo(viewerState.index + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'PageUp')                    { e.preventDefault(); goTo(viewerState.index - 1); }
    if (e.key === 'Home') goTo(0);
    if (e.key === 'End')  goTo(viewerState.total - 1);
  }
  window.addEventListener('keydown', onKey);

  // Wheel on desktop → horizontal
  let wheelLock = false;
  track.addEventListener('wheel', (e) => {
    if (window.matchMedia('(max-width: 720px)').matches) return;
    if (Math.abs(e.deltaY) < 4) return;
    e.preventDefault();
    if (wheelLock) return;
    wheelLock = true;
    goTo(viewerState.index + (e.deltaY > 0 ? 1 : -1));
    setTimeout(() => { wheelLock = false; }, 520);
  }, { passive: false });

  // Begin
  document.getElementById('v-begin').addEventListener('click', () => {
    Analytics.track('exhibition_begin_clicked', { exhibitionId: viewerState.ex.id });
    goTo(1);
  });
  const restartBtn = document.getElementById('v-cta-restart');
  if (restartBtn) restartBtn.addEventListener('click', () => {
    Analytics.track('exhibition_restart_clicked', { exhibitionId: viewerState.ex.id });
    goTo(0);
  });
  const consultBtn = document.getElementById('v-cta-consult');
  if (consultBtn) consultBtn.addEventListener('click', () => {
    Analytics.track('consultant_clicked', { exhibitionId: viewerState.ex.id, lang: viewerState.lang });
    showToast('Opening Art Consultant — stub.');
  });
  // Secure the whole show — adds every available work in the exhibition to the cart.
  track.querySelectorAll('[data-secure]').forEach(btn => btn.addEventListener('click', () => {
    const ids = [...new Set(viewerState.ex.walls.flatMap(w => w.workIds))];
    const works = ids.map(id => WORKS.find(x => x.id === id)).filter(w => w && !w.soldOut);
    Analytics.track('exhibition_secure_clicked', { exhibitionId: viewerState.ex.id, works: works.length, lang: viewerState.lang });
    postHost('cart:add', { exhibitionId: viewerState.ex.id, workIds: works.map(w => w.id) });
    showToast(works.length + ' works added to your cart');
  }));

  // Work clicks
  track.querySelectorAll('.v-work').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.work));
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(el.dataset.work); } });
  });

  document.getElementById('v-detail-close').addEventListener('click', closeDetail);
  backdrop.addEventListener('click', closeDetail);

  // Other-exhibition card clicks on the closing panel
  track.querySelectorAll('.v-other-card').forEach(card => {
    card.addEventListener('click', () => {
      const href = card.getAttribute('href') || '';
      const targetId = (href.match(/id=([^&]+)/) || [])[1] || '';
      Analytics.track('other_exhibition_clicked', { from: viewerState.ex.id, to: targetId });
    });
  });

  function openDetail(workId) {
    const w = WORKS.find(x => x.id === workId); if (!w) return;
    const wall = viewerState.ex.walls.find(wl => wl.workIds.includes(workId));
    const soldOverride = wall && wall.soldOutOverrides && wall.soldOutOverrides[workId];
    const isSold = soldOverride !== undefined ? soldOverride : w.soldOut;
    const price = new Intl.NumberFormat('de-DE', { style:'currency', currency:w.currency, maximumFractionDigits:0 }).format(w.price);
    document.getElementById('v-detail-image').innerHTML = `<div class="art" style="background-image: ${bgImage(w, 900)}"></div>`;
    document.getElementById('v-detail-body').innerHTML = `
      ${isSold ? '<div class="v-soldout-banner">No longer available · from the archive</div>' : ''}
      <div class="v-detail-eyebrow">${esc(w.medium)}</div>
      <h2 class="v-detail-title">${esc(w.title)}</h2>
      <div class="v-detail-artist">${esc(w.artist)}${w.year ? ', ' + w.year : ''}</div>
      <div class="v-detail-row"><span class="k">Edition</span><span>${w.editionSize ? 'Signed, numbered · edition of ' + w.editionSize : esc(w.editionLabel || 'Limited Edition') + (/open/i.test(w.editionLabel || '') ? '' : ' · signed &amp; numbered')}</span></div>
      <div class="v-detail-row"><span class="k">Medium</span><span>${esc(w.medium)}</span></div>
      ${(!isSold && w.available != null && w.editionSize) ? `<div class="v-detail-row"><span class="k">Available</span><span>${w.available} of ${w.editionSize}</span></div>` : ''}
      ${wall ? `<div class="v-detail-note">${esc(wall.curatorNote)}</div>` : ''}
      ${!isSold ? `
        <div class="v-detail-price">${w.priceFrom ? 'From ' : ''}${price}</div>
        <div class="v-detail-price-note">Incl. VAT. Framing available as a paid service.</div>
        <div class="v-detail-actions">
          <button class="btn" data-action="wishlist" data-work="${w.id}">Add to wishlist</button>
          <button class="btn btn-ghost" data-action="pdp" data-work="${w.id}">View the edition on LUMAS</button>
        </div>` : ''}
    `;
    detail.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => {
      const action = b.dataset.action;
      if (action === 'wishlist') {
        postHost('wishlist:add', { workId: b.dataset.work });
        Analytics.track('wishlist_added', { exhibitionId: viewerState.ex.id, workId: b.dataset.work, artist: w.artist, title: w.title });
        showToast('Saved to your wishlist');
      }
      if (action === 'pdp') {
        if (w.link) window.open(w.link, '_blank', 'noopener');
        postHost('pdp:open', { workId: b.dataset.work, url: w.link || null });
        Analytics.track('pdp_clicked', { exhibitionId: viewerState.ex.id, workId: b.dataset.work, artist: w.artist, title: w.title });
        showToast('Opening the edition · ' + w.title);
      }
    }));
    Analytics.track('work_detail_opened', { exhibitionId: viewerState.ex.id, workId, artist: w.artist, title: w.title, sold: isSold });
    detail.classList.add('open'); backdrop.classList.add('open');
  }
  function closeDetail() { detail.classList.remove('open'); backdrop.classList.remove('open'); }

  window.addEventListener('hashchange', function once() {
    window.removeEventListener('keydown', onKey); window.removeEventListener('hashchange', once);
    stopSpeech();
  });

  updateProgress();
  window.addEventListener('resize', updateProgress);
}

function postHost(type, payload) {
  try { if (window.parent && window.parent !== window) window.parent.postMessage({ source:'lumas-exhibition', type, payload }, '*'); } catch(_) {}
  console.log('[LUMAS]', type, payload || '');
}
function showToast(msg) {
  const t = document.getElementById('v-toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// =============================================================
// ROUTER (viewer-only) + BOOT
// Reads #viewer?id=<exhibitionId>&lang=<en|de|fr>. Anything else
// falls back to the default exhibition, so the page always opens
// on a working walkthrough.
// =============================================================
function parseHash() {
  const h = location.hash.replace(/^#\/?/, '') || 'viewer';
  const [route, query] = h.split('?');
  const params = new URLSearchParams(query || '');
  return { route, params };
}

function route() {
  stopSpeech();
  const { params } = parseHash();
  document.body.className = 'mode-viewer';
  renderViewer(params.get('id') || 'ex-master-artists-01', params.get('lang'));
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
