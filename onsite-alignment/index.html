<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMAS · Onsite Alignment</title>
  <style>
    :root {
      --charcoal: #1c1b19;
      --ivory: #f4f1ea;
      --bone: #d8d2c6;
      --muted: #9a958b;
      --line: rgba(244, 241, 234, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--charcoal); color: var(--ivory);
      font-family: 'Archivo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: clamp(2.5rem, 6vw, 6rem) 1.5rem 5rem; }
    header { margin-bottom: clamp(2rem, 5vw, 3.5rem); }
    .eyebrow { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin: 0 0 1rem; }
    h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 0.75rem; }
    .lede { color: var(--bone); max-width: 44ch; margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .card { display: block; background: var(--charcoal); color: inherit; text-decoration: none; padding: 1.6rem 1.5rem; transition: background 0.18s ease; }
    .card:hover { background: #262420; }
    .card .num { font-size: 0.72rem; letter-spacing: 0.18em; color: var(--muted); }
    .card h2 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.01em; margin: 0.5rem 0 0.4rem; }
    .card p { margin: 0; color: var(--bone); font-size: 0.95rem; }
    .card .arrow { display: inline-block; margin-top: 1rem; font-size: 0.85rem; color: var(--ivory); }
    footer { margin-top: 3rem; font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">LUMAS · Internal</p>
      <h1>Onsite Alignment</h1>
      <p class="lede">Projects for the session. Tap any card to open.</p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>LUMAS · onsite alignment · unlisted</footer>
  </div>

  <script>
    // Add a project: { title, href, desc }
    const projects = [
      { title: "The Collector Relationship", href: "collector-relationship/", desc: "Recurring collector revenue from the customers we already have." },
    ];
    document.getElementById("grid").innerHTML = projects.map((p, i) => `
      <a class="card" href="${p.href}">
        <span class="num">${String(i + 1).padStart(2, "0")}</span>
        <h2>${p.title}</h2>
        <p>${p.desc}</p>
        <span class="arrow">Open &#8599;</span>
      </a>`).join("");
  </script>
</body>
</html>
