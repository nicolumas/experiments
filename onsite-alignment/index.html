<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMAS · Onsite Alignment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="assets/lumas-fonts.css" rel="stylesheet">
  <style>
    :root {
      --charcoal: #1c1b19;
      --ivory: #f4f1ea;
      --bone: #d8d2c6;
      --muted: #9a958b;
      --line: rgba(244, 241, 234, 0.14);
      --disp: 'UtileDisplay', Georgia, serif;
      --sans: 'Archivo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--charcoal); color: var(--ivory);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: clamp(2.5rem, 6vw, 6rem) 1.5rem 5rem; }
    header { margin-bottom: clamp(2rem, 5vw, 3.5rem); }
    .eyebrow { font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin: 0 0 1rem; }
    h1 { font-family: var(--disp); font-size: clamp(2.4rem, 5.5vw, 3.9rem); font-weight: 400; letter-spacing: -0.01em; line-height: 1.04; margin: 0 0 0.85rem; }
    .lede { color: var(--bone); max-width: 44ch; margin: 0; }
    .grid { display: block; }
    .card { display: block; background: var(--charcoal); color: inherit; text-decoration: none; border: 1px solid var(--line); border-radius: 14px; padding: 1.6rem 1.5rem; transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease; }
    .card:hover { background: #262420; border-color: rgba(244, 241, 234, 0.30); transform: translateY(-2px); }
    .card .num { font-size: 0.72rem; letter-spacing: 0.18em; color: var(--muted); }
    .card h2 { font-family: var(--disp); font-size: 1.55rem; font-weight: 400; letter-spacing: 0; margin: 0.5rem 0 0.45rem; }
    .card p { margin: 0; color: var(--bone); font-size: 0.95rem; max-width: 46ch; }
    .card .arrow { display: inline-block; margin-top: 1rem; font-size: 0.85rem; color: var(--ivory); }
    .feature { padding: clamp(2rem, 4vw, 3rem); margin-bottom: 1rem; }
    .feature h2 { font-size: clamp(1.9rem, 3.4vw, 2.7rem); margin-top: 0.6rem; }
    .feature p { font-size: 1.05rem; max-width: 52ch; }
    .rest { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    @media (max-width: 620px) { .rest { grid-template-columns: 1fr; } }
    .section-head { font-family: var(--disp); font-weight: 400; font-size: clamp(1.4rem, 2.4vw, 1.9rem); letter-spacing: -0.01em; color: var(--ivory); margin: clamp(2.6rem, 5vw, 3.75rem) 0 1.1rem; }
    .variations { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    @media (max-width: 620px) { .variations { grid-template-columns: 1fr; } }
    footer { margin-top: 3rem; font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">LUMAS · Internal</p>
      <h1>Onsite Alignment</h1>
      <p class="lede">Projects for the session. Tap any card to open.</p>
    </header>

    <div class="grid" id="grid"></div>

    <h2 class="section-head">PDP Artist Variations</h2>
    <div class="variations" id="variations"></div>

    <h2 class="section-head">Landing Pages</h2>
    <div class="variations" id="landing"></div>

    <footer>LUMAS · onsite alignment · unlisted</footer>
  </div>

  <script>
    // Add a project: { title, href, desc }
    const projects = [
      { title: "The Unwrapping", href: "the-unwrapping/", desc: "The moment art becomes yours — unbox the Winter Edition drop, unlock a gift card, or compose a piece for someone." },
      { title: "Yours to Choose", href: "yours-to-choose/", desc: "Give art without guessing their taste — describe someone you love, a private collection is composed, and they choose the one that becomes theirs." },
      { title: "A Gift for You", href: "gift-recipient/", desc: "The recipient’s side of an art gift — a notification email opens into a dark, snow-lit reveal, where they choose works fully covered by a gift whose value is never shown." },
      { title: "The Collector Relationship", href: "collector-relationship/prototype/deck.html", desc: "Recurring collector revenue from the customers we already have." },
      { title: "How do you want to feel?", href: "feel/", desc: "Choose how you want to feel; walk a mood, and the works you love gather into your wall." },
      { title: "Lass uns spielen", href: "hang-or-pass/", desc: "Swipe-to-discover art game — real feed-driven recommendations, save to your wishlist." },
      { title: "The Exhibition", href: "exhibition/", desc: "A curated show, walked wall by wall — with voice-over, and a single move to secure the whole exhibition." },
      { title: "Two Yeses", href: "two-yeses/lumas-two-yeses-flow.html", desc: "Deciding on art together — seal three works, hand the phone over, and both commit blind. No login, no saved works." },
      { title: "Two Yeses · flow overview", href: "two-yeses/lumas-two-yeses-overview.html", desc: "Every screen of the Two Yeses flow, laid out and annotated." },
      { title: "PDP Controls", href: "pdp-controls/", desc: "UX audit of the artwork PDP’s image controls — three live concepts (minimal, unified, premium), desktop + mobile, with an annotated interactive comparison." },
      { title: "Pop-Ups (V2)", href: "pop-ups/", desc: "Seven storefront pop-ups rebuilt in the V2 brand system — framing upsell, artist follow + confirmation, two PDP quick-views (buyable + gallery), WhatsApp QR, and the Request Artwork form. Desktop + mobile bottom sheets." },
      { title: "Homepage A/B Pre-Screen", href: "homepage-ab-prescreen/", desc: "Simulated persona-panel pre-screen of 4 mobile homepage variants (DE) — ranked verdict, adversarial review, real-test handoff. A prediction to prioritise real tests, not proof of uplift." },
    ];
    const card = (p, i) => `
      <a class="card${i === 0 ? ' feature' : ''}" href="${p.href}">
        <span class="num">${String(i + 1).padStart(2, "0")}</span>
        <h2>${p.title}</h2>
        <p>${p.desc}</p>
        <span class="arrow">Open &#8599;</span>
      </a>`;
    const [first, ...rest] = projects;
    document.getElementById("grid").innerHTML =
      (first ? card(first, 0) : "") +
      (rest.length ? `<div class="rest">${rest.map((p, idx) => card(p, idx + 1)).join("")}</div>` : "");

    // PDP artist variations
    const variations = [
      { title: "Serene Garden", href: "private-view/serene-garden.html" },
      { title: "Long Shadow", href: "private-view/long-shadow.html" },
      { title: "Aset Journey", href: "private-view/aset-journey-concise.html" },
    ];
    document.getElementById("variations").innerHTML = variations.map(v => `
      <a class="card" href="${v.href}">
        <h2>${v.title}</h2>
        <span class="arrow">Open &#8599;</span>
      </a>`).join("");

    // Landing pages
    const landing = [
      { title: "Wohnzimmer Bilder", href: "wohnzimmer-bilder/" },
      { title: "Galleries", href: "galleries/" },
      { title: "Berlin Mitte", href: "galleries/berlin-mitte.html" },
    ];
    document.getElementById("landing").innerHTML = landing.map(v => `
      <a class="card" href="${v.href}">
        <h2>${v.title}</h2>
        <span class="arrow">Open &#8599;</span>
      </a>`).join("");
  </script>
</body>
</html>
